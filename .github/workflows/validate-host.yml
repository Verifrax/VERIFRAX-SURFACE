name: Validate projected host

on:
  workflow_call:
    inputs:
      repo_path:
        required: false
        type: string
        default: "."

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate host config
        run: python3 scripts/validate_host.py "${{ inputs.repo_path }}/surface.host.json"
